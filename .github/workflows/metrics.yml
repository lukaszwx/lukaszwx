name: Generate Azzure Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: lukaszwx
          filename: metrics.svg

          theme: terminal
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: America/Sao_Paulo

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_details: percentage

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 30
          plugin_activity_filter: all

          extras_css: |
            :root {
              --color-calendar-graph-day-bg: #050816;
              --color-calendar-graph-day-L1-bg: #0ea5e9;
              --color-calendar-graph-day-L2-bg: #38bdf8;
              --color-calendar-graph-day-L3-bg: #60a5fa;
              --color-calendar-graph-day-L4-bg: #93c5fd;
            }

            .field-box {
              border-radius: 18px !important;
              border: 1px solid #0ea5e944 !important;
              background: linear-gradient(180deg, #050816 0%, #0b1120 100%) !important;
              box-shadow: 0 0 30px rgba(14,165,233,.18), inset 0 0 30px rgba(56,189,248,.05);
            }

            h1, h2, h3 {
              color: #38bdf8 !important;
            }

      - name: Deploy Metrics
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: output
          publish_dir: .
