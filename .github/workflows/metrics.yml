name: Generate Azzure Metrics

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lukaszwx
          filename: metrics.svg

          theme: terminal
          template: classic
          base: header, activity, community, repositories, metadata

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 8

          plugin_activity: yes
          plugin_activity_limit: 5

          extras_css: |
            :root {
              --color-calendar-graph-day-bg: #050816;
              --color-calendar-graph-day-L1-bg: #0ea5e9;
              --color-calendar-graph-day-L2-bg: #38bdf8;
              --color-calendar-graph-day-L3-bg: #60a5fa;
              --color-calendar-graph-day-L4-bg: #93c5fd;
            }
