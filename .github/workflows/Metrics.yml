name: Generate Azzure Metrics

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: azzure-metrics
  cancel-in-progress: true

jobs:
  metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Generate Azzure Metrics SVG
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: lukaszwx

          filename: assets/metrics/azzure-metrics.svg
          output_action: commit
          committer_branch: output
          committer_message: "chore: update Azzure metrics"

          template: classic
          config_timezone: America/Fortaleza
          config_twemoji: yes
          config_animations: yes
          config_display: large

          base: header, activity, community, repositories, metadata

          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          plugin_languages: yes
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_threshold: 0%

          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_visibility: all
          plugin_activity_timestamps: yes
          plugin_activity_days: 14
          plugin_activity_filter: all

          plugin_repositories: yes
          plugin_repositories_featured: lukaszwx/Azzure-Platform, lukaszwx/Zenvra-StreetWear, lukaszwx/autoprime-garage

          extras_css: |
            /* ─────────────────────────────────────────────
               AZZURE SYSTEM :: PREMIUM METRICS INTERFACE
               Owner: lukaszwx
               Mode: Cyber Clean / Founder Card
            ───────────────────────────────────────────── */

            :root {
              --az-bg: #050816;
              --az-bg-2: #020617;
              --az-surface: #0b1120;
              --az-surface-2: #111827;
              --az-border: #38bdf830;
              --az-border-soft: #38bdf812;
              --az-glow: #38bdf8;
              --az-glow-2: #0ea5e9;
              --az-accent: #7dd3fc;
              --az-text: #e2e8f0;
              --az-muted: #94a3b8;
              --az-dim: #64748b;
              --az-danger: #ff4fa3;
            }

            * {
              box-sizing: border-box !important;
            }

            svg {
              background:
                radial-gradient(circle at 18% 0%, #38bdf81c 0%, transparent 34%),
                radial-gradient(circle at 85% 12%, #0ea5e918 0%, transparent 30%),
                linear-gradient(135deg, var(--az-bg) 0%, var(--az-bg-2) 100%) !important;
              font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace !important;
            }

            svg > rect:first-of-type {
              fill: transparent !important;
              stroke: var(--az-border) !important;
              stroke-width: 0.9px !important;
              rx: 14px !important;
              filter: drop-shadow(0 0 24px #38bdf820) !important;
            }

            text,
            tspan {
              fill: var(--az-text) !important;
              font-family: "JetBrains Mono", "Fira Code", monospace !important;
            }

            text.muted,
            .field-value-muted text {
              fill: var(--az-muted) !important;
            }

            .header text,
            .section-title text {
              fill: var(--az-glow) !important;
              font-weight: 700 !important;
              letter-spacing: 0.16em !important;
              text-transform: uppercase !important;
              filter: drop-shadow(0 0 5px #38bdf850) !important;
            }

            rect.field-bg,
            rect.section-bg,
            .field rect {
              fill: #0b1120cc !important;
              stroke: var(--az-border) !important;
              stroke-width: 0.55px !important;
              rx: 8px !important;
              filter:
                drop-shadow(0 0 8px #38bdf810)
                drop-shadow(0 8px 18px #00000035) !important;
            }

            line.sep,
            line[class*="sep"] {
              stroke: var(--az-glow) !important;
              stroke-width: 0.35px !important;
              stroke-dasharray: 3 6 !important;
              opacity: 0.45 !important;
            }

            .octicon {
              fill: var(--az-glow) !important;
              filter: drop-shadow(0 0 4px #38bdf870) !important;
            }

            rect.progress-bg,
            rect[class*="progress-bg"] {
              fill: #0f172a !important;
              rx: 4px !important;
              stroke: var(--az-border-soft) !important;
              stroke-width: 0.3px !important;
            }

            rect.progress,
            rect[class*="progress"]:not([class*="bg"]) {
              fill: url(#az-progress) var(--az-glow) !important;
              rx: 4px !important;
              filter: drop-shadow(0 0 6px #38bdf890) !important;
            }

            rect[class*="contribution-"],
            rect.color-empty,
            rect.color-scale-1,
            rect.color-scale-2,
            rect.color-scale-3,
            rect.color-scale-4 {
              rx: 2.5px !important;
              stroke-width: 0.45px !important;
            }

            rect.color-empty {
              fill: #0b1120 !important;
              stroke: #38bdf810 !important;
            }

            rect.color-scale-1 {
              fill: #082f49 !important;
              stroke: #38bdf818 !important;
            }

            rect.color-scale-2 {
              fill: #0369a1 !important;
              stroke: #38bdf830 !important;
              filter: drop-shadow(0 0 2px #0ea5e970) !important;
            }

            rect.color-scale-3 {
              fill: #0ea5e9 !important;
              stroke: #7dd3fc55 !important;
              filter: drop-shadow(0 0 4px #0ea5e990) !important;
            }

            rect.color-scale-4 {
              fill: #7dd3fc !important;
              stroke: #e0f2fe99 !important;
              filter: drop-shadow(0 0 7px #38bdf8cc) !important;
            }

            circle[class*="language"],
            .chart circle {
              filter: drop-shadow(0 0 4px currentColor) !important;
            }

            .avatar circle,
            image + circle {
              stroke: var(--az-glow) !important;
              stroke-width: 1.8px !important;
              fill: none !important;
              filter:
                drop-shadow(0 0 8px #38bdf880)
                drop-shadow(0 0 18px #0ea5e930) !important;
            }

            a:hover text,
            a:hover tspan {
              fill: var(--az-accent) !important;
              filter: drop-shadow(0 0 5px #38bdf870) !important;
            }
