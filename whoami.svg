<svg xmlns="http://www.w3.org/2000/svg" width="860" height="260" viewBox="0 0 860 260">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#020617"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>

    <linearGradient id="glassL" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#0a1e35;stop-opacity:0.25"/>
    </linearGradient>

    <linearGradient id="glassR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e3352;stop-opacity:0.45"/>
      <stop offset="100%" style="stop-color:#061524;stop-opacity:0.25"/>
    </linearGradient>

    <linearGradient id="accentL" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="35%" style="stop-color:#38bdf8;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0"/>
    </linearGradient>

    <linearGradient id="accentR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0"/>
      <stop offset="45%" style="stop-color:#38bdf8;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#7dd3fc;stop-opacity:0"/>
    </linearGradient>

    <radialGradient id="glowL" cx="15%" cy="15%" r="55%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.14"/>
      <stop offset="100%" style="stop-color:#0ea5e9;stop-opacity:0"/>
    </radialGradient>

    <radialGradient id="glowR" cx="85%" cy="85%" r="55%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#38bdf8;stop-opacity:0"/>
    </radialGradient>

    <filter id="shadow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- BG -->
  <rect width="860" height="260" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="130" cy="55"  rx="150" ry="90"  fill="#0284c7" opacity="0.06" filter="url(#glow)"/>
  <ellipse cx="730" cy="210" rx="130" ry="80"  fill="#38bdf8" opacity="0.05" filter="url(#glow)"/>

  <!-- ─── LEFT CARD ─── -->
  <rect x="18" y="18" width="500" height="224" rx="14" fill="#000" opacity="0.35" filter="url(#shadow)"/>
  <rect x="16" y="16" width="500" height="224" rx="14" fill="url(#glassL)"/>
  <rect x="16" y="16" width="500" height="224" rx="14" fill="url(#glowL)"/>
  <rect x="16" y="16" width="500" height="224" rx="14" fill="none" stroke="#38bdf8" stroke-width="0.7" opacity="0.3"/>
  <!-- top accent -->
  <rect x="32"  y="16" width="280" height="1.5" rx="1" fill="url(#accentL)"/>

  <!-- header -->
  <text x="32" y="46" font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700" fill="#38bdf8" letter-spacing="3.5" opacity="0.95">SOBRE MIM</text>
  <line x1="32" y1="54" x2="500" y2="54" stroke="#38bdf8" stroke-width="0.35" opacity="0.18"/>

  <!-- rows — label col x=32, value col x=148 -->
  <!-- FUNÇÃO -->
  <text x="32"  y="80" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">FUNÇÃO</text>
  <text x="148" y="80" font-family="'JetBrains Mono',monospace" font-size="11" font-weight="700" fill="#f0f9ff">Frontend Developer</text>

  <!-- LOCALIZAÇÃO -->
  <text x="32"  y="106" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">LOCALIZAÇÃO</text>
  <text x="148" y="106" font-family="'JetBrains Mono',monospace" font-size="11" fill="#94a3b8">Brasil</text>

  <!-- FOCO -->
  <text x="32"  y="132" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">FOCO</text>
  <text x="148" y="132" font-family="'JetBrains Mono',monospace" font-size="11" fill="#94a3b8">UI/UX  ·  Sistemas  ·  Performance</text>

  <!-- STACK -->
  <text x="32"  y="158" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">STACK</text>
  <text x="148" y="158" font-family="'JetBrains Mono',monospace" font-size="11" fill="#94a3b8">React  ·  Next.js  ·  TypeScript  ·  Node.js</text>

  <!-- APRENDENDO -->
  <text x="32"  y="184" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">APRENDENDO</text>
  <text x="148" y="184" font-family="'JetBrains Mono',monospace" font-size="11" fill="#94a3b8">Rust  ·  WebGL  ·  Animações Avançadas</text>

  <!-- OBJETIVO -->
  <text x="32"  y="210" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">OBJETIVO</text>
  <text x="148" y="210" font-family="'JetBrains Mono',monospace" font-size="10.5" fill="#7dd3fc" font-style="italic">Construir coisas rápidas e bonitas</text>

  <!-- ─── RIGHT CARD ─── -->
  <rect x="534" y="18" width="310" height="224" rx="14" fill="#000" opacity="0.35" filter="url(#shadow)"/>
  <rect x="532" y="16" width="310" height="224" rx="14" fill="url(#glassR)"/>
  <rect x="532" y="16" width="310" height="224" rx="14" fill="url(#glowR)"/>
  <rect x="532" y="16" width="310" height="224" rx="14" fill="none" stroke="#38bdf8" stroke-width="0.7" opacity="0.25"/>
  <!-- top accent -->
  <rect x="548" y="16" width="180" height="1.5" rx="1" fill="url(#accentR)"/>

  <!-- header + status dot -->
  <text x="548" y="46" font-family="'JetBrains Mono',monospace" font-size="9" font-weight="700" fill="#38bdf8" letter-spacing="3.5" opacity="0.95">STATUS ATUAL</text>
  <!-- green dot -->
  <circle cx="824" cy="42" r="4.5" fill="#22c55e" opacity="0.15"/>
  <circle cx="824" cy="42" r="3"   fill="#22c55e" opacity="0.9"/>
  <line x1="548" y1="54" x2="832" y2="54" stroke="#38bdf8" stroke-width="0.35" opacity="0.18"/>

  <!-- rows -->
  <!-- CONSTRUINDO -->
  <text x="548" y="82" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">CONSTRUINDO</text>
  <text x="548" y="97" font-family="'JetBrains Mono',monospace" font-size="11" fill="#94a3b8">Projetos pessoais</text>

  <!-- ESTUDANDO -->
  <text x="548" y="122" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">ESTUDANDO</text>
  <text x="548" y="137" font-family="'JetBrains Mono',monospace" font-size="11" fill="#94a3b8">System Design &amp; CS</text>

  <!-- META -->
  <text x="548" y="162" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">META</text>
  <text x="548" y="177" font-family="'JetBrains Mono',monospace" font-size="11" fill="#94a3b8">Junior  →  Mid-Level</text>

  <!-- PERGUNTA -->
  <text x="548" y="202" font-family="'JetBrains Mono',monospace" font-size="8" fill="#334155" letter-spacing="1.2">PERGUNTE SOBRE</text>
  <text x="548" y="217" font-family="'JetBrains Mono',monospace" font-size="11" fill="#7dd3fc">React  ·  CSS  ·  APIs</text>

</svg>
